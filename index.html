
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Defense Quiz Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="w-full max-w-3xl bg-white shadow-2xl rounded-xl overflow-hidden transition-all duration-300">
        
        <div class="w-full bg-gray-200 h-3">
            <div id="progress-bar" class="bg-indigo-600 h-3" style="width: 0%"></div>
        </div>

        <div class="p-6 md:p-10">
            <header class="mb-8 border-b pb-4">
                <h1 class="text-3xl font-bold text-gray-800">🛡️ Cyber Defense Simulator</h1>
                <div class="mt-3 text-lg font-semibold text-indigo-600 flex justify-between">
                    <span>Score: <span id="score-display">0</span></span>
                    <span id="question-count" class="text-sm text-gray-400 font-normal"></span>
                </div>
            </header>

            <div id="quiz-content">
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-lg mb-6">
                    <h2 class="text-sm uppercase tracking-wider font-bold text-indigo-400 mb-1">Incident Report:</h2>
                    <p id="scenario-text" class="text-gray-700 leading-relaxed font-mono text-sm"></p>
                </div>

                <div class="mb-6">
                    <p id="question-text" class="text-lg font-medium text-gray-800 mb-3"></p>
                    <input type="text" id="answer-input" placeholder="Enter defense protocol..."
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm"
                           onkeydown="if(event.key === 'Enter') checkAnswer();">
                </div>

                <div id="feedback-area" class="min-h-[60px] mb-4"></div>
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="checkAnswer()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg active:transform active:scale-95 transition">Submit</button>
                    <button onclick="giveHint()" id="hint-button" class="bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold py-3 rounded-lg shadow-md">Hint</button>
                    <button onclick="skipQuestion()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg shadow-md">Skip</button>
                </div>
            </div>

            <div id="results-screen" class="hidden text-center p-8">
                <h2 class="text-4xl font-black text-gray-800 mb-4">MISSION COMPLETE</h2>
                <p class="text-gray-600 mb-2">Final Security Rating:</p>
                <div id="final-score" class="text-6xl font-black text-indigo-600 mb-6"></div>
                <div id="score-analysis" class="mb-8 text-gray-700 italic"></div>
                
                <button onclick="downloadLog()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg mr-2">Download Log File</button>
                <button onclick="location.reload()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg">Restart</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. База из 25 вопросов ---
        const ALL_SCENARIOS = [
            { problem: "Attacker tries every possible password combination.", question: "Name this attack.", answer: "brute force", hints: ["Strength in numbers", "Testing all keys"] },
            { problem: "Fake website looks like a bank login page.", question: "What is this technique?", answer: "phishing", hints: ["Fishing for data", "Social engineering"] },
            { problem: "Flooding a server with fake traffic to crash it.", question: "What is this attack?", answer: "ddos", hints: ["Distributed", "Denial of Service"] },
            { problem: "A code injected into a URL to steal cookies.", question: "Type of vulnerability?", answer: "xss", hints: ["Cross-site", "Scripting"] },
            { problem: "Software that encrypts files and asks for money.", question: "What is it?", answer: "ransomware", hints: ["Digital kidnapping", "WannaCry is one"] },
            { problem: "Using a thumb drive found in a parking lot.", question: "Type of social engineering?", answer: "baiting", hints: ["The drive is the bait", "Curiosity kills"] },
            { problem: "A secret entrance to a system bypassing security.", question: "Technical term?", answer: "backdoor", hints: ["Hidden entry", "Developer's shortcut"] },
            { problem: "Scrambling data so only authorized users read it.", question: "What is this process?", answer: "encryption", hints: ["Making it unreadable", "AES, RSA"] },
            { problem: "An attacker sits between you and a website.", question: "Name the attack.", answer: "mitm", hints: ["Man in the middle", "Interception"] },
            { problem: "Verifying identity using password + SMS code.", question: "What is this called?", answer: "mfa", hints: ["Two or more steps", "Multi-factor"] },
            { problem: "Hiding a virus inside a useful program.", question: "What is this?", answer: "trojan", hints: ["Greek myth", "Hidden threat"] },
            { problem: "An exploit for which no patch exists yet.", question: "What is it called?", answer: "zero day", hints: ["Brand new", "0-day"] },
            { problem: "Checking if a user is who they claim to be.", question: "Security term?", answer: "authentication", hints: ["Login process", "Who are you?"] },
            { problem: "Giving a user only the access they need.", question: "What principle is this?", answer: "least privilege", hints: ["Minimize rights", "Zero trust"] },
            { problem: "Monitoring network traffic for suspicious patterns.", question: "System name (abbr)?", answer: "ids", hints: ["Intrusion Detection", "I_S"] },
            { problem: "A hardware or software barrier for traffic.", question: "What is it?", answer: "firewall", hints: ["Wall of fire", "Packet filter"] },
            { problem: "Recording every key pressed on a computer.", question: "What is this malware?", answer: "keylogger", hints: ["Log of keys", "Spyware"] },
            { problem: "Searching through trash for passwords.", question: "What is this called?", answer: "dumpster diving", hints: ["Trash", "Physical security"] },
            { problem: "A decoy system to lure attackers.", question: "Technical term?", answer: "honeypot", hints: ["Sweet trap", "Sticky pot"] },
            { problem: "Testing a system for weaknesses legally.", question: "What is this?", answer: "pentesting", hints: ["Penetration", "Ethical hacking"] },
            { problem: "A small file used to track sessions.", question: "What is it?", answer: "cookie", hints: ["Tasty name", "Web storage"] },
            { problem: "Attack targeting high-level executives.", question: "What is it?", answer: "whaling", hints: ["Big fish", "CEO fraud"] },
            { problem: "Software that shows unwanted ads and tracks.", question: "What is it?", answer: "adware", hints: ["Advertising", "Pop-ups"] },
            { problem: "IP address of the local machine.", question: "What is the IP?", answer: "127.0.0.1", hints: ["Home", "Localhost"] },
            { problem: "A network of infected computers.", question: "What is it called?", answer: "botnet", hints: ["Robot network", "Zombie army"] }
        ];

        let currentScenarios = [];
        let currentQuestionIndex = 0;
        let totalScore = 0;
        let hintsGiven = 0;
        let sessionLog = "--- CYBERSECURITY QUIZ LOG ---\nStarted: " + new Date().toLocaleString() + "\n";

        // --- 2. Функции логики ---

        // Рандомное перемешивание
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initQuiz() {
            currentScenarios = shuffle([...ALL_SCENARIOS]); // Берем все 25 и перемешиваем
            loadQuestion();
        }

        function updateUI() {
            const progress = (currentQuestionIndex / currentScenarios.length) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('score-display').textContent = totalScore;
            document.getElementById('question-count').textContent = `Threat ${currentQuestionIndex + 1} of ${currentScenarios.length}`;
        }

        function loadQuestion() {
            if (currentQuestionIndex >= currentScenarios.length) {
                showResults();
                return;
            }
            updateUI();
            const q = currentScenarios[currentQuestionIndex];
            document.getElementById('scenario-text').textContent = q.problem;
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('answer-input').value = '';
            document.getElementById('feedback-area').innerHTML = '';
            hintsGiven = 0;
            updateHintButton();
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input').value.toLowerCase().trim();
            const correct = currentScenarios[currentQuestionIndex].answer;
            const feedback = document.getElementById('feedback-area');

            if (input === correct) {
                const points = 25 - (hintsGiven * 10);
                totalScore += points;
                sessionLog += `Q${currentQuestionIndex+1}: Correct (${points} pts). Answer: ${input}\n`;
                feedback.innerHTML = '<div class="text-green-600 font-bold">Protocol accepted. Threat neutralized.</div>';
                setTimeout(() => { currentQuestionIndex++; loadQuestion(); }, 1000);
            } else {
                sessionLog += `Q${currentQuestionIndex+1}: Incorrect attempt: ${input}\n`;
                feedback.innerHTML = '<div class="text-red-500 font-bold">Access Denied. Invalid protocol.</div>';
            }
        }

        function giveHint() {
            if (hintsGiven < 2) {
                const hint = currentScenarios[currentQuestionIndex].hints[hintsGiven];
                document.getElementById('feedback-area').innerHTML = `<div class="text-yellow-600 italic">Hint: ${hint}</div>`;
                hintsGiven++;
                updateHintButton();
                sessionLog += `Q${currentQuestionIndex+1}: Hint used\n`;
            }
        }

        function skipQuestion() {
            sessionLog += `Q${currentQuestionIndex+1}: Question skipped\n`;
            currentQuestionIndex++;
            loadQuestion();
        }

        function updateHintButton() {
            document.getElementById('hint-button').textContent = `Hint (${hintsGiven}/2)`;
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('results-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = totalScore;
            sessionLog += `\nFinal Score: ${totalScore}\nEnd: ${new Date().toLocaleString()}`;
        }

        // Тот самый ЛОГ-ФАЙЛ через Blackbox-метод
        function downloadLog() {
            const blob = new Blob([sessionLog], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'cyber_security_log.txt';
            link.click();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
